<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ data.page_title }}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">🚄 LyonVaycay</div>
        <div class="nav-links">Best Weekend Escapes</div>
    </nav>

    <main class="container">
        <header class="hero">
            <h1>Top Rated Weekend Trips</h1>
            <p>We tracked the prices. You pack the bags. Here are the most "Worth It" trips this month.</p>
        </header>

        <div class="trips-grid">

            <div class="trip-card">
                <div class="card-header">
                    <h2>Paris</h2>
                    <span class="badge score-badge">Score: 92/100</span>
                </div>

                <div class="card-body">
                    <p class="dates">🗓️ Fri Mar 13 - Sun Mar 15</p>
                    <div class="stats">
                        <div class="stat-item">
                            <span class="label">Total Vacation:</span>
                            <span class="value">63h 35m</span>
                        </div>
                    </div>
                </div>

                <div class="card-footer">
                    <div class="price">35.48€</div>
                    <button class="book-btn">View Details</button>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
